<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>atShare — Share Selector Demo</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 680px;
      margin: 60px auto;
      padding: 0 20px;
      color: #0f172a;
    }
    h1 { font-size: 1.5rem; margin-bottom: 4px; }
    p { color: #475569; font-size: 14px; margin-top: 4px; }

    .demo-card {
      margin-top: 40px;
      padding: 24px;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
    }
    .demo-card h2 { font-size: 1rem; margin: 0 0 12px; }

    .theme-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    /* Custom theme example */
    .dark-theme atshare-selector {
      --atshare-bg: #1e293b;
      --atshare-bg-hover: #334155;
      --atshare-color: #f8fafc;
      --atshare-border: #334155;
      --atshare-accent: #60a5fa;
    }
  </style>

</head>
<body>
  <h1>atShare</h1>
  <p>Universal open social share selector — demo</p>

  <div class="demo-card">
    <h2>Default</h2>
    <atshare-selector
      url="https://atshare.social"
      text="Check out atShare — a universal share selector for AT Protocol and ActivityPub:">
    </atshare-selector>
  </div>

  <div class="demo-card">
    <h2>Custom label</h2>
    <atshare-selector
      url="https://atshare.social"
      label="Share this post">
    </atshare-selector>
  </div>

  <div class="demo-card dark-theme" style="background:#0f172a;">
    <h2 style="color:#f8fafc;">Custom theme (dark)</h2>
    <atshare-selector
      url="https://atshare.social"
      text="Dark theme example">
    </atshare-selector>
  </div>

  <script type="module" src="/dist/atshare-selector.js"></script>
</body>
</html>
