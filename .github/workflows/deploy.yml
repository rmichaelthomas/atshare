name: Deploy to Production
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci
      - run: npm run build

      - name: Assemble deploy folder
        run: |
          mkdir -p deploy/dist
          mkdir -p deploy/demo

          # Landing page
          cp index.html deploy/

          # Built component bundles
          cp dist/atshare-selector.js deploy/dist/
          cp dist/atshare-selector.umd.cjs deploy/dist/

          # Demo page
          cp public/demo/index.html deploy/demo/

      - name: Deploy via SFTP
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SFTP_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          sftp -o StrictHostKeyChecking=no -o Port=${{ secrets.SFTP_PORT }} -i ~/.ssh/deploy_key -b - ${{ secrets.SFTP_USER }}@${{ secrets.SFTP_HOST }} <<'SFTP'
          cd /home/adjaxahy/public_html
          put deploy/index.html index.html
          cd /home/adjaxahy/public_html/dist
          put deploy/dist/atshare-selector.js atshare-selector.js
          put deploy/dist/atshare-selector.umd.cjs atshare-selector.umd.cjs
          cd /home/adjaxahy/public_html/demo
          put deploy/demo/index.html index.html
          bye
          SFTP
          rm ~/.ssh/deploy_key
