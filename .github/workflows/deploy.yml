name: Deploy to Production
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci
      - run: npm run build

      - name: Assemble deploy folder
        run: |
          mkdir -p deploy/dist
          mkdir -p deploy/demo

          # Landing page
          cp index.html deploy/

          # Built component bundles
          cp dist/atshare-selector.js deploy/dist/
          cp dist/atshare-selector.umd.cjs deploy/dist/

          # Demo page
          cp public/demo/index.html deploy/demo/

          # Static assets (branding, SEO)
          cp public/og.png deploy/
          cp public/favicon.svg deploy/
          cp public/favicon-32.png deploy/
          cp public/apple-touch-icon.png deploy/
          cp public/robots.txt deploy/
          cp public/.htaccess deploy/

      - name: Deploy via SCP
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SFTP_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Use scp instead of sftp — scp reports errors clearly
          SCP_OPTS="-o StrictHostKeyChecking=no -o Port=${{ secrets.SFTP_PORT }} -i ~/.ssh/deploy_key"
          REMOTE="${{ secrets.SFTP_USER }}@${{ secrets.SFTP_HOST }}"
          DEST="/home/adjaxahy/atshare.social"

          scp $SCP_OPTS deploy/index.html "${REMOTE}:${DEST}/index.html"
          scp $SCP_OPTS deploy/dist/atshare-selector.js "${REMOTE}:${DEST}/dist/atshare-selector.js"
          scp $SCP_OPTS deploy/dist/atshare-selector.umd.cjs "${REMOTE}:${DEST}/dist/atshare-selector.umd.cjs"
          scp $SCP_OPTS deploy/demo/index.html "${REMOTE}:${DEST}/demo/index.html"

          scp $SCP_OPTS deploy/og.png "${REMOTE}:${DEST}/og.png"
          scp $SCP_OPTS deploy/favicon.svg "${REMOTE}:${DEST}/favicon.svg"
          scp $SCP_OPTS deploy/favicon-32.png "${REMOTE}:${DEST}/favicon-32.png"
          scp $SCP_OPTS deploy/apple-touch-icon.png "${REMOTE}:${DEST}/apple-touch-icon.png"
          scp $SCP_OPTS deploy/robots.txt "${REMOTE}:${DEST}/robots.txt"
          scp $SCP_OPTS deploy/.htaccess "${REMOTE}:${DEST}/.htaccess"

          echo "Deploy complete. Verifying..."

          # Verify files were written by checking remote timestamps
          ssh $SCP_OPTS "${REMOTE}" "ls -la ${DEST}/index.html ${DEST}/dist/atshare-selector.js ${DEST}/og.png ${DEST}/.htaccess"

          rm ~/.ssh/deploy_key
